<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Interactive Audio-Visual Camera</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
</head>
<body>
<script>
let video;
let mic; // マイク入力を管理する変数

function setup() {
    createCanvas(640, 480);
    
    // カメラのセットアップ
    video = createCapture(VIDEO);
    video.size(640, 480);
    video.hide(); 
    noStroke();

    // マイク入力を開始
    mic = new p5.AudioIn();
    mic.start();
}

function draw() {
    background(0);
    
    // 1. マイクの音量を取得（0.0 〜 1.0 の間で値が返ってきます）
    let vol = mic.getLevel();
    
    // 音量（通常は0.1以下など小さな値）を、ドットの最低サイズ〜最大サイズに変換
    // 声が大きければ大きいほど、ドットが大きくなります
    let pixelSize = map(vol, 0, 0.3, 8, 48, true);
    // 小数点を切り捨てて整数にする
    pixelSize = floor(pixelSize);

    // 2. マウスのX座標（左右の位置）の割合を取得（0.0 〜 1.0）
    let mouseRatio = mouseX / width;
    // 画面外にマウスがある時のためのエラー防止
    mouseRatio = constrain(mouseRatio, 0, 1);

    video.loadPixels();
    
    for (let y = 0; y < video.height; y += pixelSize) {
        for (let x = 0; x < video.width; x += pixelSize) {
            
            let index = ((video.width - x - 1) + y * video.width) * 4;
            
            let r = video.pixels[index];
            let g = video.pixels[index + 1];
            let b = video.pixels[index + 2];
            
            // --- マウスの位置で色味（チャンネル）を変化させる ---
            // 左側（0%）：サイケデリックな赤強調
            // 中央（50%）：通常のフルカラー
            // 右側（100%）：青・緑が強調されたサイバーな色味
            r = r * (1 - mouseRatio) * 2;
            g = g * mouseRatio * 1.5;
            b = b * mouseRatio * 2;
            
            fill(r, g, b);
            
            // 音量が大きい（ドットが大きい）ときは、少し丸みを持たせる（形を円にする）
            if (pixelSize > 24) {
                circle(x + pixelSize/2, y + pixelSize/2, pixelSize - 2);
            } else {
                rect(x, y, pixelSize - 1, pixelSize - 1);
            }
        }
    }
}

// ブラウザのセキュリティ対策：画面をクリックしたときにオーディオを確実に有効化する
function touchStarted() {
    getAudioContext().resume();
}
</script>
</body>
</html>
