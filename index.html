<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Interactive Pixel Art Camera</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
</head>
<body>
<script>
let video;
let sizeSlider;     // ドットサイズ変更用のスライダー
let colorModeBtn;   // 色味切り替え用のボタン
let currentMode = 0; // 0: 通常カラー, 1: モノクロ, 2: レトロゲーム風（緑）

function setup() {
    createCanvas(640, 480);
    
    // カメラのセットアップ
    video = createCapture(VIDEO);
    video.size(640, 480);
    video.hide(); 
    noStroke();

    // --- UI（コントローラー）の作成 ---
    // 1. スライダー（最小値4、最大値40、初期値16、1刻み）
    createP('ドットの大きさ:');
    sizeSlider = createSlider(4, 40, 16, 1);
    
    // 2. ボタン
    createP(''); // 改行用
    colorModeBtn = createButton('色味を切り替え');
    colorModeBtn.mousePressed(changeColorMode); // クリックされたら関数を実行
}

function draw() {
    background(0);
    
    // スライダーの現在の値を取得
    let pixelSize = sizeSlider.value();
    
    video.loadPixels();
    
    for (let y = 0; y < video.height; y += pixelSize) {
        for (let x = 0; x < video.width; x += pixelSize) {
            
            // 鏡写し（ミラー効果）の計算
            let index = ((video.width - x - 1) + y * video.width) * 4;
            
            let r = video.pixels[index];
            let g = video.pixels[index + 1];
            let b = video.pixels[index + 2];
            
            // 選択されているモードに応じて色を加工
            if (currentMode === 1) {
                // 【モノクロ】輝度（明るさ）の平均値を計算して白黒にする
                let gray = (r + g + b) / 3;
                r = gray;
                g = gray;
                b = gray;
            } else if (currentMode === 2) {
                // 【レトロゲーム風】明るさに応じて緑色の濃淡をつける（ゲームボーイ風）
                let gray = (r + g + b) / 3;
                r = gray * 0.15;
                g = gray * 0.8; // 緑を強調
                b = gray * 0.15;
            }
            
            // 加工した色でドットを描画
            fill(r, g, b);
            
            // 少しだけ隙間をあけると、よりドット絵らしくなります（pixelSize - 1）
            rect(x, y, pixelSize - 1, pixelSize - 1);
        }
    }
}

// ボタンが押されたらモードを 0 -> 1 -> 2 -> 0... と切り替える関数
function changeColorMode() {
    currentMode = (currentMode + 1) % 3;
}
</script>
</body>
</html>
